<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegan Pancakes</title>
</head>
<body>
    <h1>Vegan Pancakes</h1>
    <img src="../images/vegan_pancakes.jpg" alt="vegan pancakes" width="300px" height="300px">
    <h6>These fluffy vegan pancakes are delicious! I have been making them for years, and everyone that tries them wants the recipe.</h6>
    <h2>Ingredients</h2>
    <ul>
        <li>1 1/4 cups all-purpose flour</li>
        <li>2 Tbs white sugar</li>
        <li>2 tsp baking powder</li>
        <li>1/2 tsp salt</li>
        <li>1 1/4 cuos water</li>
        <li>1 Tbs oil</li>
    </ul>

</body>
</html>
